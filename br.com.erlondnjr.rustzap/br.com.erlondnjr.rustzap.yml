app-id: br.com.erlondnjr.rustzap
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rustzap/cargo-home
    TMPDIR: /tmp
command: rustzap
finish-args:
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --share=network
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=host:ro
modules:
  - name: rustzap
    buildsystem: simple
    build-commands:
      - cargo fetch --manifest-path Cargo.toml --target-dir /run/build/rustzap/target
      - cargo build --release --manifest-path Cargo.toml --target-dir /run/build/rustzap/target
      - install -Dm755 /run/build/rustzap/target/release/rustzap /app/bin/rustzap
      - install -Dm644 icons/128x128.png /app/share/icons/hicolor/256x256/apps/br.com.erlondnjr.rustzap.png
      - install -Dm644 br.com.erlondnjr.rustzap.desktop /app/share/applications/br.com.erlondnjr.rustzap.desktop
      - install -Dm644 br.com.erlondnjr.rustzap.metainfo.xml /app/share/metainfo/br.com.erlondnjr.rustzap.metainfo.xml
    sources:
      - type: git
        url: https://github.com/ejrgeek/rustzap.git
        tag: TAG_DA_VERSION